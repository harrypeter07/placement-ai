# Pings Render worker /health (free). Schedule: every 5 min (GitHub often ignores */2).
#
# REQUIRED secret (Repository secrets → Actions):
#   WORKER_URL = https://placement-ai-2lhp.onrender.com
#   (no quotes, no trailing slash, no spaces)
#
# Optional:
#   VERCEL_APP_URL = https://plarm.vercel.app
#   CRON_SECRET = same as TELEGRAM_WORKER_SECRET

name: Keep worker alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render worker /health
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          set -euo pipefail
          if [ -z "${WORKER_URL:-}" ]; then
            echo "::error::Missing GitHub secret WORKER_URL"
            echo "Add: Settings → Secrets → Actions → WORKER_URL"
            echo "Value example: https://placement-ai-2lhp.onrender.com"
            exit 1
          fi
          # Trim whitespace / accidental quotes
          BASE=$(printf '%s' "$WORKER_URL" | tr -d '\r\n' | sed 's/^["'\'']//;s/["'\'']$//' | xargs)
          if ! printf '%s' "$BASE" | grep -qE '^https?://'; then
            echo "::error::WORKER_URL must start with https:// (got: $BASE)"
            exit 1
          fi
          BASE="${BASE%/}"
          echo "GET $BASE/health"
          body=$(curl -fsS "$BASE/health" || true)
          echo "$body" | head -c 2500
          echo ""
          echo "$body" | grep -q '"ok"' && echo "Health OK" || echo "::warning::Unexpected health response"
          echo "$body" | grep -o '"telegram":"[^"]*"' || true
          echo "$body" | grep -o '"waitReason":"[^"]*"' || true

      - name: Ping Vercel cron (optional)
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${VERCEL_APP_URL:-}" ]; then
            echo "VERCEL_APP_URL not set — skip"
            exit 0
          fi
          BASE=$(printf '%s' "$VERCEL_APP_URL" | tr -d '\r\n' | sed 's/^["'\'']//;s/["'\'']$//' | xargs)
          BASE="${BASE%/}"
          url="$BASE/api/cron/worker-ping"
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS -H "Authorization: Bearer $CRON_SECRET" "$url" | head -c 1500 || true
          else
            curl -fsS "$url" | head -c 1500 || true
          fi
          echo ""
