# Free keep-alive: pings your Render worker so the Web Service stays warm.
# GitHub may delay scheduled runs (often ~5–15 min) even with */2 — still helps.
#
# Required repo secret: WORKER_URL = https://placement-ai-2lhp.onrender.com (no trailing slash)
# Optional: VERCEL_APP_URL = https://plarm.vercel.app
# Optional: CRON_SECRET = same as TELEGRAM_WORKER_SECRET (for Vercel /api/cron/worker-ping)

name: Keep worker alive

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render worker /health
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "::error::Add GitHub secret WORKER_URL (e.g. https://placement-ai-2lhp.onrender.com)"
            exit 1
          fi
          echo "GET $WORKER_URL/health"
          resp=$(curl -sS -w "\nHTTP_CODE:%{http_code}" "$WORKER_URL/health")
          code=$(echo "$resp" | tail -1 | sed 's/HTTP_CODE://')
          body=$(echo "$resp" | sed '$d')
          echo "$body" | head -c 2000
          echo ""
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Worker health returned $code"
            exit 0
          fi
          echo "$body" | grep -q '"ok": true' || echo "::warning::Health JSON missing ok:true"
          reason=$(echo "$body" | grep -o '"waitReason":"[^"]*"' | head -1 || true)
          if [ -n "$reason" ]; then
            echo "waitReason: $reason"
          fi
          telegram=$(echo "$body" | grep -o '"telegram":"[^"]*"' | head -1 || true)
          echo "telegram status: $telegram"

      - name: Ping Vercel cron (optional)
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$VERCEL_APP_URL" ]; then
            echo "VERCEL_APP_URL secret not set — skip"
            exit 0
          fi
          url="$VERCEL_APP_URL/api/cron/worker-ping"
          if [ -n "$CRON_SECRET" ]; then
            curl -sS -H "Authorization: Bearer $CRON_SECRET" "$url" | head -c 1500
          else
            curl -sS "$url" | head -c 1500
          fi
          echo ""
